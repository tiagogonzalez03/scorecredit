<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 Risk Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-2xl w-full">
        <h1 class="text-4xl font-bold text-center mb-2">🛡️ Radar de Solvência</h1>
        <p class="text-slate-400 text-center mb-8">Análise de Crédito S&P 500</p>

        <div class="flex gap-2 mb-8">
            <input type="text" id="empresaInput" placeholder="Digite o Ticker (Ex: MMM, AAPL, META)" 
                class="flex-1 p-3 rounded bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500">
            <button onclick="buscar()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded font-bold transition">Analisar</button>
        </div>

        <div id="resultado" class="hidden"></div>
    </div>

    <script>
        async function buscar() {
            const nome = document.getElementById('empresaInput').value;
            const resDiv = document.getElementById('resultado');
            if (!nome) return alert("Digite o nome da empresa!");

            try {
                // Tenta conectar na API
                const response = await fetch(`/api/consulta?empresa=${nome}`);
                
                if (response.status === 404) {
                    resDiv.innerHTML = `<p class="text-red-400 text-center">Empresa não encontrada no CSV.</p>`;
                    resDiv.classList.remove('hidden');
                    return;
                }

                const data = await response.json();
                
                const cor = data.Rating.includes('BAIXO') ? 'border-green-500' : 
                            data.Rating.includes('ALTO') ? 'border-red-500' : 'border-yellow-500';

                resDiv.innerHTML = `
                    <div class="bg-slate-800 border-t-4 ${cor} p-6 rounded-lg shadow-xl">
                        <h2 class="text-2xl font-bold mb-2">${data.Empresa}</h2>
                        <p class="text-sm font-bold p-2 bg-slate-900 rounded inline-block mb-4">${data.Rating}</p>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-900 p-4 rounded text-center">
                                <p class="text-xs text-slate-400 uppercase">Alavancagem</p>
                                <p class="text-xl font-mono font-bold">${data.Alavancagem}x</p>
                            </div>
                            <div class="bg-slate-900 p-4 rounded text-center">
                                <p class="text-xs text-slate-400 uppercase">Status</p>
                                <p class="text-xl font-bold">${data.Alavancagem < 2 ? 'Saudável' : 'Alerta'}</p>
                            </div>
                        </div>
                    </div>
                `;
                resDiv.classList.remove('hidden');
            } catch (e) {
                alert("Erro ao conectar na API. Verifique se o deploy terminou.");
            }
        }
    </script>
</body>
</html>
