<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Análise S&P 500</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center py-12">
    <div class="max-w-md w-full px-4">
        <h1 class="text-3xl font-bold mb-6 text-center">Radar de Solvência</h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="empresaInput" placeholder="Ex: MMM, META, AAPL" 
                class="flex-1 p-3 rounded bg-slate-800 border border-slate-700">
            <button onclick="buscar()" class="bg-blue-600 px-6 py-3 rounded font-bold">Analisar</button>
        </div>

        <div id="resultado" class="hidden space-y-4"></div>
    </div>

    <script>
        async function buscar() {
            const nome = document.getElementById('empresaInput').value.trim();
            const resDiv = document.getElementById('resultado');
            if (!nome) return alert("Digite um ticker!");

            resDiv.innerHTML = "Carregando...";
            resDiv.classList.remove('hidden');

            try {
                // Chamada direta para a rota definida no vercel.json
                const response = await fetch(`/api/consulta?empresa=${nome}`);
                
                if (!response.ok) throw new Error("Não encontrado");

                const data = await response.json();
                
                resDiv.innerHTML = `
                    <div class="bg-slate-800 p-6 rounded-lg border-l-4 ${data.Rating.includes('BAIXO') ? 'border-green-500' : 'border-red-500'}">
                        <h2 class="text-xl font-bold">${data.Empresa}</h2>
                        <p class="text-lg my-2">${data.Rating}</p>
                        <p class="text-slate-400">Alavancagem: ${data.Alavancagem}x</p>
                    </div>
                `;
            } catch (e) {
                resDiv.innerHTML = `<p class="text-red-400">Erro: Ticker não encontrado ou falha na API.</p>`;
            }
        }
    </script>
</body>
</html>
