<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S&P Risk Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">🛡️ Radar de Solvência</h1>
        <div class="flex gap-2">
            <input type="text" id="tickerInput" placeholder="Ex: MMM, AAPL" 
                   class="flex-1 p-2 rounded bg-slate-800 border border-slate-700 uppercase">
            <button onclick="analisar()" class="bg-blue-600 px-4 py-2 rounded font-bold">ANALISAR</button>
        </div>
        <div id="resultado" class="mt-8 hidden p-4 bg-slate-800 rounded border-l-4"></div>
    </div>

    <script>
        async function analisar() {
            const ticker = document.getElementById('tickerInput').value;
            const resDiv = document.getElementById('resultado');
            if (!ticker) return;

            resDiv.innerHTML = "Buscando...";
            resDiv.classList.remove('hidden');

            try {
                // Chamada para a API
                const response = await fetch(`/api/consulta?empresa=${ticker}`);
                const data = await response.json();

                if (!response.ok) {
                    resDiv.style.borderColor = "#ef4444"; // Vermelho
                    resDiv.innerHTML = `<p class="text-red-400">❌ ${data.erro}</p>`;
                } else {
                    resDiv.style.borderColor = data.Rating.includes('BAIXO') ? "#22c55e" : "#eab308"; // Verde ou Amarelo
                    resDiv.innerHTML = `
                        <h2 class="font-bold text-xl">${data.Empresa}</h2>
                        <p class="text-lg my-2">${data.Rating}</p>
                        <p class="text-slate-400 font-mono">Alavancagem: ${data.Alavancagem}x</p>
                    `;
                }
            } catch (e) {
                resDiv.innerHTML = "ERRO: O servidor não respondeu.";
            }
        }
    </script>
</body>
</html>
